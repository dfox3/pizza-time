<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dFizza</title>
    <link rel="stylesheet" href="/static/style.css" />
    <style>
      body {
        font-family: sans-serif;
        max-width: 1200px;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      table {
        border-collapse: collapse;
        width: 100%;
        font-size: 0.85rem;
      }
      th,
      td {
        border: 1px solid #ccc;
        padding: 0.4rem 0.6rem;
        text-align: left;
      }
      th {
        background: #f5f5f5;
      }
      tr:hover {
        background: #fafafa;
      }
      input[type="number"],
      input[type="text"],
      select {
        width: 100%;
        box-sizing: border-box;
      }
      form.create-form {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 0.5rem;
        margin-top: 1rem;
      }
      form.create-form label {
        display: flex;
        flex-direction: column;
        font-size: 0.8rem;
        gap: 0.2rem;
      }
      form.create-form button {
        align-self: end;
        padding: 0.4rem 1rem;
      }
      .toolbar {
        display: flex;
        align-items: center;
        gap: 1rem;
        margin-bottom: 0.5rem;
      }
      .toolbar label {
        font-size: 0.9rem;
      }
      h2 {
        margin-top: 2rem;
      }
      button {
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>🍕 dFizza</h1>

    <h2>Dough Recipes</h2>

    <div class="toolbar">
      <label>
        Multiplier:
        <input
          id="multiplier"
          type="number"
          value="1.0"
          step="0.1"
          min="0.1"
          style="width: 70px"
        />
      </label>
      <button
        hx-get="/ui/dough-recipe/rows"
        hx-target="#recipe-tbody"
        hx-vals='js:{"multiplier": document.getElementById("multiplier").value}'
      >
        Refresh
      </button>
      <label>
        Target Diameter:
        <input
          id="target-diameter"
          type="number"
          value="12.0"
          step="0.1"
          min="0.1"
          style="width: 70px"
        />
      </label>
      <button
        hx-get="/ui/dough-recipe/rows"
        hx-target="#recipe-tbody"
        hx-vals='js:{"target_diameter": document.getElementById("target-diameter").value}'
      >
        Refresh
      </button>
    </div>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Flour Type</th>
          <th>Brand</th>
          <th>Flour (g)</th>
          <th>Water (g)</th>
          <th>Salt (g)</th>
          <th>Yeast (g)</th>
          <th>Sugar (g)</th>
          <th>Oil (g)</th>
          <th>Ball Wt</th>
          <th>Hydration</th>
          <th>Diameter</th>
          <th></th>
        </tr>
      </thead>
      <tbody
        id="recipe-tbody"
        hx-get="/ui/dough-recipe/rows"
        hx-trigger="load"
      ></tbody>
    </table>

    <h3>Add Recipe</h3>
    <form
      class="create-form"
      hx-post="/ui/dough-recipe"
      hx-target="#recipe-tbody"
      hx-swap="beforeend"
      hx-on::after-request="if(event.detail.successful) this.reset()"
    >
      <label
        >Name <input name="name" type="text" placeholder="e.g. Neapolitan"
      /></label>
      <label
        >Flour Type
        <select name="flour_type">
          <option value="AP">AP</option>
          <option value="Bread">Bread</option>
          <option value="00">00 (Double Zero)</option>
          <option value="Whole Wheat">Whole Wheat</option>
        </select>
      </label>
      <label
        >Flour Brand
        <input name="flour_brand" type="text" placeholder="optional"
      /></label>
      <label
        >Flour (g)
        <input name="flour_grams" type="number" step="0.1" value="500" required
      /></label>
      <label
        >Water (g)
        <input name="water_grams" type="number" step="0.1" value="325" required
      /></label>
      <label
        >Salt (g)
        <input name="salt_grams" type="number" step="0.1" value="10" required
      /></label>
      <label
        >Yeast (g)
        <input name="yeast_grams" type="number" step="0.1" value="2" required
      /></label>
      <label
        >Sugar (g)
        <input
          name="sugar_grams"
          type="number"
          step="0.1"
          placeholder="optional"
      /></label>
      <label
        >Oil (g)
        <input name="oil_grams" type="number" step="0.1" placeholder="optional"
      /></label>
      <button type="submit">Add Recipe</button>
    </form>

    <script
      src="https://cdn.jsdelivr.net/npm/htmx.org@4.0.0-beta4"
      integrity="sha384-aWZK1NtOs/aWb/+YZdTM8q2JkWEshlMc9mgZ189numT9bwFhyAyYEoO4nO/2dTXt"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
